name: Deploy Mizuki to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 安装 pnpm（与项目版本完全一致）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      # 安装 Node.js（升级到 Astro 支持的版本）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # 从 20 升级到 22，满足 Astro >=22.12.0 的要求
          cache: 'pnpm'

      # 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 构建 Astro 站点
      - name: Build site
        run: pnpm run build

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 部署到 GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
